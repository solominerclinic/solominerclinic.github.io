<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blog - SoloMinerClinic</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange: #F7931A;
  --dark: #0D0D0D;
  --card: #161616;
  --border: rgba(255,255,255,0.08);
  --text: #F0F0F0;
  --muted: #888;
  --white: #FFFFFF;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--dark);
  color: var(--text);
}

/* Header (same as your site) */
header {
  position: sticky;
  top: 0;
  background: rgba(13,13,13,0.97);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}

.header-title {
  text-align: center;
  padding: 1.1rem 2rem 0.6rem;
  border-bottom: 1px solid var(--border);
}

.header-title a {
  font-family: 'Space Mono', monospace;
  font-size: 1.55rem;
  font-weight: 700;
  color: var(--orange);
  text-decoration: none;
}

nav {
  display: flex;
  justify-content: center;
  padding: 0.6rem 2rem;
}

nav ul {
  list-style: none;
  display: flex;
  gap: 1.5rem;
}

nav a {
  text-decoration: none;
  color: var(--muted);
  font-size: 0.82rem;
}

nav a:hover { color: var(--text); }

/* Blog Section */
.blog-wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 4rem 2rem 6rem;
  text-align: center;
}

.blog-title {
  font-family: 'Space Mono', monospace;
  font-size: 1rem;
  letter-spacing: 0.2em;
  color: var(--orange);
  margin-bottom: 1rem;
  text-transform: uppercase;
}

.blog-heading {
  font-size: clamp(1.6rem, 3vw, 2.2rem);
  font-weight: 600;
  color: var(--white);
  margin-bottom: 1rem;
}

.blog-subtext {
  font-size: 0.95rem;
  color: var(--muted);
  max-width: 500px;
  margin: 0 auto 2rem;
  line-height: 1.7;
}

/* Card */
.blog-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 2rem;
  display: inline-block;
}

.blog-card p {
  color: var(--muted);
  font-size: 0.9rem;
}

/* Footer */
footer {
  border-top: 1px solid var(--border);
  padding: 2rem;
  text-align: center;
  color: var(--muted);
  font-size: 0.8rem;
}
</style>
</head>

<body>

<header>
  <div class="header-title">
    <a href="index.html">SoloMinerClinic</a>
  </div>
  <nav>
    <ul>
      <li><a href="index.html#services">Services</a></li>
      <li><a href="index.html#pricing">Pricing</a></li>
      <li><a href="index.html#inventory">Inventory</a></li>
      <li><a href="blog.html" style="color:#F7931A;">Blog</a></li>
    </ul>
  </nav>
</header>

<div class="blog-wrap">
  <div class="blog-title">Blog</div>
  <div class="blog-heading">Content Coming Soon</div>

  <div class="blog-subtext">
    Repairs, diagnostics, ASIC failures, and real-world miner cases.
    This section will document everything we see on the bench.
  </div>

  <div class="blog-card">
    <p>Blog will be here soon.</p>
  </div>
</div>

<footer>
  © 2026 Solo Miner Clinic. All rights reserved.
</footer>

</body>
</html>
